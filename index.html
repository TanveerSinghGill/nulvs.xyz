<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Secure PDF Access</title>
</head>
<body>

<div id="loginDiv">
    <h2>Enter credentials</h2>
    <label>Username: </label>
    <input type="text" id="username"><br><br>
    <label>Password: </label>
    <input type="password" id="password"><br><br>
    <button onclick="checkLogin()">Login</button>
    <p id="error" style="color:red;"></p>
</div>

<div id="pdfDiv" style="display:none;">
    <h2>Chapter PDF</h2>
    <iframe src="jesc101.pdf" width="100%" height="600px"></iframe>
</div>

<script>
function checkLogin() {
    const user = document.getElementById('username').value.toLowerCase();
    const pass = document.getElementById('password').value.toLowerCase();

    if (user === 'outlook' && pass === 'sybau') {
        document.getElementById('loginDiv').style.display = 'none';
        document.getElementById('pdfDiv').style.display = 'block';
    } else {
        document.getElementById('error').textContent = 'Incorrect credentials!';
    }
}
</script>

</body>
</html>
