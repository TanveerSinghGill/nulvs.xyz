<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>
      Nox
    </title>
    <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;700;800&amp;family=JetBrains+Mono:wght@300;400&amp;display=swap" rel="stylesheet" />
    <style>
      *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #030305;
    --surface: #0a0a0f;
    --cyan: #00f5ff;
    --magenta: #ff00c8;
    --green: #00ff88;
    --text: #e8e8f0;
    --muted: #555570;
  }

  html, body {
    min-height: 100vh;
    background: var(--bg);
    font-family: 'JetBrains Mono', monospace;
    color: var(--text);
    overflow-x: hidden;
  }

  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image:
      linear-gradient(rgba(0,245,255,0.03) 1px, transparent 1px),
      linear-gradient(90deg, rgba(0,245,255,0.03) 1px, transparent 1px);
    background-size: 40px 40px;
    animation: gridShift 20s linear infinite;
    pointer-events: none;
    z-index: 0;
  }

  body::after {
    content: '';
    position: fixed;
    inset: 0;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.04'/%3E%3C/svg%3E");
    pointer-events: none;
    z-index: 0;
    opacity: 0.5;
  }

  @keyframes gridShift {
    0% { transform: translateY(0); }
    100% { transform: translateY(40px); }
  }

  .line-h {
    position: fixed;
    left: 0; right: 0;
    height: 1px;
    background: linear-gradient(90deg, transparent 0%, rgba(0,245,255,0.0) 5%, rgba(0,245,255,0.6) 50%, rgba(0,245,255,0.0) 95%, transparent 100%);
    animation: moveH 7s ease-in-out infinite;
    box-shadow: 0 0 10px rgba(0,245,255,0.4), 0 0 20px rgba(0,245,255,0.15);
    pointer-events: none;
    z-index: 3;
  }

  .line-v {
    position: fixed;
    top: 0; bottom: 0;
    width: 1px;
    background: linear-gradient(180deg, transparent 0%, rgba(255,0,200,0.0) 5%, rgba(255,0,200,0.6) 50%, rgba(255,0,200,0.0) 95%, transparent 100%);
    animation: moveV 9s ease-in-out infinite;
    box-shadow: 0 0 10px rgba(255,0,200,0.4), 0 0 20px rgba(255,0,200,0.15);
    pointer-events: none;
    z-index: 3;
  }

  @keyframes moveH {
    0%   { top: 8%; }
    50%  { top: 92%; }
    100% { top: 8%; }
  }

  @keyframes moveV {
    0%   { left: 4%; }
    50%  { left: 96%; }
    100% { left: 4%; }
  }

  .orb {
    position: fixed;
    border-radius: 50%;
    filter: blur(80px);
    pointer-events: none;
    z-index: 0;
    animation: orbFloat 8s ease-in-out infinite;
  }
  .orb-1 {
    width: 400px; height: 400px;
    background: radial-gradient(circle, rgba(0,245,255,0.12), transparent 70%);
    top: -100px; left: -100px;
  }
  .orb-2 {
    width: 300px; height: 300px;
    background: radial-gradient(circle, rgba(255,0,200,0.1), transparent 70%);
    bottom: -50px; right: -80px;
    animation-delay: -4s;
  }
  .orb-3 {
    width: 200px; height: 200px;
    background: radial-gradient(circle, rgba(0,255,136,0.08), transparent 70%);
    top: 50%; left: 50%;
    animation-delay: -2s;
  }

  @keyframes orbFloat {
    0%, 100% { transform: translate(0, 0); }
    33% { transform: translate(30px, -20px); }
    66% { transform: translate(-20px, 15px); }
  }

  .container {
    position: relative;
    z-index: 1;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 60px 24px;
  }

  .scanline {
    position: fixed;
    top: 0; left: 0; right: 0;
    height: 2px;
    background: linear-gradient(90deg, transparent, var(--cyan), transparent);
    opacity: 0.4;
    animation: scan 4s linear infinite;
    z-index: 999;
    pointer-events: none;
  }
  @keyframes scan {
    0% { top: 0; opacity: 0; }
    10% { opacity: 0.4; }
    90% { opacity: 0.4; }
    100% { top: 100vh; opacity: 0; }
  }

  .clock {
    position: fixed;
    bottom: 20px;
    right: 24px;
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px;
    letter-spacing: 0.15em;
    color: rgba(85,85,112,0.35);
    z-index: 10;
    pointer-events: none;
  }

  .profile {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 20px;
    margin-bottom: 48px;
    animation: fadeUp 0.8s cubic-bezier(0.16, 1, 0.3, 1) both;
  }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(30px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .name-block {
    text-align: center;
    min-width: 200px;
    min-height: 1.1em;
  }

  .name-wrap {
    position: relative;
    display: inline-block;
  }

  .name {
    font-family: 'Syne', sans-serif;
    font-size: clamp(42px, 10vw, 72px);
    font-weight: 800;
    letter-spacing: -0.02em;
    line-height: 1;
    background: linear-gradient(135deg, var(--cyan) 0%, var(--magenta) 60%, var(--green) 100%);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    display: inline-block;
    position: relative;
    min-width: 4px;
  }

  .name.glitching {
    animation: nameGlow 3s ease-in-out infinite alternate;
  }

  @keyframes nameGlow {
    from { filter: drop-shadow(0 0 20px rgba(0,245,255,0.3)); }
    to   { filter: drop-shadow(0 0 40px rgba(255,0,200,0.5)); }
  }

  .type-cursor {
    display: inline-block;
    width: 3px;
    height: 0.85em;
    background: var(--cyan);
    margin-left: 2px;
    vertical-align: middle;
    border-radius: 1px;
    animation: blink 0.7s step-end infinite;
    box-shadow: 0 0 8px var(--cyan);
  }

  @keyframes blink {
    0%, 100% { opacity: 1; }
    50%       { opacity: 0; }
  }

  .glitch-layer {
    position: absolute;
    top: 0; left: 0;
    font-family: 'Syne', sans-serif;
    font-size: clamp(42px, 10vw, 72px);
    font-weight: 800;
    letter-spacing: -0.02em;
    line-height: 1;
    opacity: 0;
    pointer-events: none;
    white-space: nowrap;
  }

  .glitch-layer.r {
    background: linear-gradient(135deg, var(--magenta), var(--magenta));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    animation: glitchR 4s infinite;
  }

  .glitch-layer.g {
    background: linear-gradient(135deg, var(--green), var(--green));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    animation: glitchG 4s infinite;
  }

  .glitch-layer.inactive {
    animation: none !important;
    opacity: 0 !important;
  }

  @keyframes glitchR {
    0%, 80%, 100% { opacity: 0; transform: translate(0); clip-path: none; }
    82% { opacity: 0.75; transform: translate(5px, -2px); clip-path: polygon(0 20%, 100% 20%, 100% 50%, 0 50%); }
    84% { opacity: 0.75; transform: translate(-4px, 2px); clip-path: polygon(0 60%, 100% 60%, 100% 85%, 0 85%); }
    86% { opacity: 0; }
  }

  @keyframes glitchG {
    0%, 80%, 100% { opacity: 0; transform: translate(0); clip-path: none; }
    83% { opacity: 0.6; transform: translate(-4px, 1px); clip-path: polygon(0 5%, 100% 5%, 100% 35%, 0 35%); }
    85% { opacity: 0.6; transform: translate(4px, -1px); clip-path: polygon(0 70%, 100% 70%, 100% 95%, 0 95%); }
    87% { opacity: 0; }
  }

  .avatar-wrap { position: relative; order: -1; }

  .avatar-ring {
    position: absolute;
    inset: -6px;
    border-radius: 50%;
    background: conic-gradient(var(--cyan), var(--magenta), var(--green), var(--cyan));
    animation: spin 4s linear infinite;
    z-index: -1;
  }

  .avatar-ring-mask {
    position: absolute;
    inset: 2px;
    border-radius: 50%;
    background: var(--bg);
    z-index: -1;
  }

  @keyframes spin {
    from { transform: rotate(0deg); }
    to   { transform: rotate(360deg); }
  }

  .avatar {
    width: 100px; height: 100px;
    border-radius: 50%;
    background: linear-gradient(135deg, #0a0a1a, #111122);
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: 'Syne', sans-serif;
    font-size: 36px;
    font-weight: 800;
    color: var(--cyan);
    border: 2px solid rgba(0,245,255,0.1);
    position: relative;
    overflow: hidden;
    animation: avatarGlitch 3.5s infinite;
  }

  .avatar .glitch-r,
  .avatar .glitch-g {
    position: absolute;
    inset: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: 'Syne', sans-serif;
    font-size: 36px;
    font-weight: 800;
    border-radius: 50%;
    opacity: 0;
    pointer-events: none;
  }

  .avatar .glitch-r { color: var(--magenta); animation: avGlitchR 3.5s infinite; }
  .avatar .glitch-g { color: var(--green);   animation: avGlitchG 3.5s infinite; }

  @keyframes avatarGlitch {
    0%, 80%, 100% { transform: translate(0); }
    82% { transform: translate(-3px, 1px) skewX(-2deg); }
    84% { transform: translate(3px, -2px) skewX(2deg); }
    86% { transform: translate(-1px, 1px); }
    88% { transform: translate(0); }
  }

  @keyframes avGlitchR {
    0%, 80%, 100% { opacity: 0; transform: translate(0); clip-path: none; }
    82% { opacity: 0.75; transform: translate(5px, -2px); clip-path: polygon(0 25%, 100% 25%, 100% 50%, 0 50%); }
    84% { opacity: 0.75; transform: translate(-4px, 2px); clip-path: polygon(0 60%, 100% 60%, 100% 80%, 0 80%); }
    86% { opacity: 0; }
  }

  @keyframes avGlitchG {
    0%, 80%, 100% { opacity: 0; transform: translate(0); clip-path: none; }
    83% { opacity: 0.6; transform: translate(-4px, 1px); clip-path: polygon(0 10%, 100% 10%, 100% 35%, 0 35%); }
    85% { opacity: 0.6; transform: translate(4px, -1px); clip-path: polygon(0 70%, 100% 70%, 100% 90%, 0 90%); }
    87% { opacity: 0; }
  }

  .links {
    display: flex;
    flex-direction: column;
    gap: 14px;
    width: 100%;
    max-width: 400px;
  }

  .link-item {
    position: relative;
    text-decoration: none;
    display: flex;
    align-items: center;
    gap: 16px;
    padding: 16px 22px;
    background: rgba(255,255,255,0.02);
    border: 1px solid rgba(255,255,255,0.06);
    border-radius: 12px;
    transition: all 0.3s cubic-bezier(0.16, 1, 0.3, 1);
    overflow: hidden;
    animation: fadeUp 0.8s cubic-bezier(0.16, 1, 0.3, 1) both;
  }

  .link-item:nth-child(1) { animation-delay: 0.15s; }
  .link-item:nth-child(2) { animation-delay: 0.25s; }
  .link-item:nth-child(3) { animation-delay: 0.35s; }
  .link-item:nth-child(4) { animation-delay: 0.45s; }

  .link-item::before {
    content: '';
    position: absolute;
    inset: 0;
    background: linear-gradient(90deg, transparent, rgba(255,255,255,0.04), transparent);
    transform: translateX(-100%);
    transition: transform 0.5s ease;
  }

  .link-item:hover::before { transform: translateX(100%); }

  .link-item.discord:hover {
    border-color: rgba(88,101,242,0.4);
    background: rgba(88,101,242,0.06);
    box-shadow: 0 8px 32px rgba(88,101,242,0.15);
  }

  .link-item.twitter:hover {
    border-color: rgba(255,255,255,0.4);
    background: rgba(255,255,255,0.05);
    box-shadow: 0 8px 32px rgba(255,255,255,0.1);
  }

  .link-item.instagram:hover {
    border-color: rgba(255,0,200,0.4);
    background: rgba(255,0,200,0.05);
    box-shadow: 0 8px 32px rgba(255,0,200,0.12);
  }

  .link-item.bluesky:hover {
    border-color: rgba(0,245,255,0.4);
    background: rgba(0,245,255,0.05);
    box-shadow: 0 8px 32px rgba(0,245,255,0.12);
  }

  .icon-wrap {
    width: 40px; height: 40px;
    border-radius: 10px;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
    transition: transform 0.3s ease;
  }

  .link-item:hover .icon-wrap { transform: scale(1.1) rotate(-5deg); }

  .icon-wrap.discord-icon { background: rgba(88,101,242,0.15); border: 1px solid rgba(88,101,242,0.2); }
  .icon-wrap.twitter-icon { background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1); }
  .icon-wrap.instagram-icon { background: rgba(255,0,200,0.1); border: 1px solid rgba(255,0,200,0.2); }
  .icon-wrap.bluesky-icon { background: rgba(0,133,255,0.15); border: 1px solid rgba(0,133,255,0.2); }

  .link-text { flex: 1; }

  .link-label {
    font-family: 'Syne', sans-serif;
    font-size: 15px;
    font-weight: 700;
    color: var(--text);
    display: block;
    letter-spacing: 0.02em;
  }

  .link-sub {
    font-size: 11px;
    color: var(--muted);
    margin-top: 2px;
    letter-spacing: 0.05em;
  }

  .arrow {
    color: var(--muted);
    font-size: 18px;
    transition: all 0.3s ease;
    opacity: 0.4;
  }

  .link-item:hover .arrow {
    transform: translateX(4px);
    opacity: 1;
    color: var(--cyan);
  }

  * { cursor: none !important; }

  .cursor {
    position: fixed;
    width: 8px; height: 8px;
    background: var(--cyan);
    border-radius: 50%;
    pointer-events: none;
    z-index: 9999;
    transform: translate(-50%, -50%);
    box-shadow: 0 0 10px var(--cyan);
  }

  .cursor-trail {
    position: fixed;
    width: 24px; height: 24px;
    border: 1px solid rgba(0,245,255,0.3);
    border-radius: 50%;
    pointer-events: none;
    z-index: 9998;
    transform: translate(-50%, -50%);
    transition: all 0.15s ease;
  }
    </style>
  </head>

          </div>
          <span class="arrow">→</span>
        </a>
      </div>
    </div>
    <script>
      function updateClock() {
        const now = new Date();
        const ist = new Date(now.toLocaleString('en-US', { timeZone: 'Asia/Kolkata' }));
        const h = String(ist.getHours()).padStart(2, '0');
        const m = String(ist.getMinutes()).padStart(2, '0');
        const s = String(ist.getSeconds()).padStart(2, '0');
        document.getElementById('clock').textContent = `${h}:${m}:${s} IST`;
      }
      updateClock();
      setInterval(updateClock, 1000);

      const nameEl     = document.getElementById('nameEl');
      const typeCursor = document.getElementById('typeCursor');
      const glitchR    = document.getElementById('glitchR');
      const glitchG    = document.getElementById('glitchG');
      let current = '';

      function setGlitch(active, text) {
        if (active) {
          glitchR.textContent = text;
          glitchG.textContent = text;
          glitchR.classList.remove('inactive');
          glitchG.classList.remove('inactive');
          nameEl.classList.add('glitching');
        } else {
          glitchR.classList.add('inactive');
          glitchG.classList.add('inactive');
          nameEl.classList.remove('glitching');
        }
      }

      function wait(ms) { return new Promise(resolve => setTimeout(resolve, ms)); }

      async function typeChar(char, delay) {
        await wait(delay);
        current += char;
        nameEl.textContent = current;
      }

      async function deleteChar(delay) {
        await wait(delay);
        current = current.slice(0, -1);
        nameEl.textContent = current;
      }

      async function deleteAll(charDelay) {
        while (current.length > 0) { await deleteChar(charDelay); }
      }

      async function runLoop() {
        while (true) {
          setGlitch(false, '');
          await wait(500);
          await typeChar('N', 160);
          await wait(100);
          await typeChar('O', 170);
          await wait(90);
          await typeChar('N', 150); 
          await wait(500);            
          await deleteChar(130);      
          await wait(180);
          await typeChar('X', 160);   
          await wait(800);            
          setGlitch(true, 'NOX');
          await wait(1800);           
          setGlitch(false, '');
          await deleteAll(110);
          await wait(300);
          await typeChar('n', 150);
          await wait(80);
          await typeChar('u', 140);
          await wait(70);
          await typeChar('l', 145);
          await wait(80);
          await typeChar('l', 140); 
          await wait(70);
          await typeChar('v', 140);
          await wait(70);
          await typeChar('s', 150);
          await wait(900);            
          await deleteAll(110);
          await wait(400);
        }
      }

      window.addEventListener('load', () => { setTimeout(runLoop, 500); });

      const cursor = document.getElementById('cursor');
      const trail  = document.getElementById('cursorTrail');
      let mx = 0, my = 0, tx = 0, ty = 0;

      document.addEventListener('mousemove', e => {
        mx = e.clientX; my = e.clientY;
        cursor.style.left = mx + 'px';
        cursor.style.top  = my + 'px';
      });

      function animateTrail() {
        tx += (mx - tx) * 0.12;
        ty += (my - ty) * 0.12;
        trail.style.left = tx + 'px';
        trail.style.top  = ty + 'px';
        requestAnimationFrame(animateTrail);
      }
      animateTrail();
    </script>
  </body>
</html>
